<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>El Foundry de la Banda</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --dos-green: #62ff8b;
      --dos-green-bright: #a0ffb7;
      --dos-green-dim: #1d8f43;
      --dos-amber: #ffd15c;
      --dos-amber-bright: #ffe494;
      --dos-muted: #c3ccc5;
      --dos-red: #ff6868;
      --dos-shadow: rgba(98, 255, 139, 0.18);
      --dos-font: "VT323", "Fixedsys", "Lucida Console", "Courier New", monospace;
    }

    body {
      text-rendering: optimizeSpeed;
      -webkit-font-smoothing: none;
      font-smooth: never;
    }

    #site-background {
      opacity: 1;
      filter: none;
      transform: none;
      image-rendering: auto;
    }

    .title-block h1 {
      color: var(--dos-green);
      font-family: var(--dos-font);
      font-size: clamp(4rem, 8vw, 8rem);
      line-height: 0.72;
      letter-spacing: 0.035em;
      text-shadow:
        3px 0 0 #000,
        -3px 0 0 #000,
        0 3px 0 #000,
        0 -3px 0 #000,
        4px 4px 0 #000;
    }

    .title-block p,
    .dos-kicker,
    .dos-subtitle {
      color: var(--dos-amber);
      font-family: var(--dos-font);
      font-size: clamp(1.35rem, 2vw, 1.9rem);
      font-weight: 400;
      letter-spacing: 0.1em;
      text-shadow:
        2px 0 0 #000,
        -2px 0 0 #000,
        0 2px 0 #000,
        0 -2px 0 #000;
    }

    .server-panel {
      background: rgba(2, 8, 5, 0.94);
      font-family: var(--dos-font);
      text-shadow: 2px 2px 0 #000;
    }

    .server-panel::before {
      color: var(--dos-amber-bright);
      font-size: clamp(1.2rem, 1.8vw, 1.55rem);
    }

    .status-row {
      font-size: clamp(1.65rem, 3vw, 2.25rem);
      letter-spacing: 0.08em;
    }

    .foundry-link {
      color: var(--dos-green-bright);
      font-family: var(--dos-font);
      font-size: clamp(1.45rem, 2.5vw, 2rem);
      letter-spacing: 0.06em;
      text-shadow: 2px 2px 0 #000;
    }

    .server-panel[data-state="offline"] {
      border-color: #b43a3a;
      outline-color: rgba(255, 104, 104, 0.3);
      background: rgba(12, 2, 2, 0.94);
      color: var(--dos-red);
    }

    .server-panel[data-state="offline"] .status-row,
    .server-panel[data-state="offline"]::before {
      color: var(--dos-red);
    }

    .server-panel[data-state="offline"] .prompt-prefix {
      color: #ff8a58;
    }

    .server-panel[data-state="offline"] .foundry-link[aria-disabled="true"] {
      border-color: #9a4242;
      color: #e3bcbc;
      background: rgba(0, 0, 0, 0.76);
    }

    @media (max-width: 720px) {
      .title-block h1 {
        font-size: clamp(3.5rem, 17vw, 5.6rem);
        line-height: 0.7;
      }

      .title-block p,
      .dos-kicker,
      .dos-subtitle {
        font-size: 1.3rem;
      }

      .status-row {
        font-size: clamp(1.65rem, 8vw, 2.2rem);
      }

      .foundry-link {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <video
    id="site-background"
    aria-hidden="true"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    disablepictureinpicture
  >
    <source src="VideoProject25-web-720p.mp4" type="video/mp4">
  </video>

  <main class="hero">
    <header class="title-block">
      <p class="dos-kicker">C:\BANDA\FOUNDRY&gt; BOOT PORTAL.EXE</p>
      <h1>
        <span>EL FOUNDRY</span>
        <span>DE LA BANDA</span>
      </h1>
      <p class="dos-subtitle">PORTAL DE CAMPAÑAS</p>
    </header>

    <section class="server-panel" id="server-panel" data-state="checking" aria-live="polite">
      <div class="status-row">
        <span class="status-light" aria-hidden="true"></span>
        <span id="status-text">RUN CHECK_SERVER.BAT...</span>
      </div>

      <a
        class="foundry-link"
        id="foundry-link"
        aria-disabled="true"
        tabindex="-1"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="prompt-prefix">&gt;</span> Entrar a Foundry
      </a>
    </section>
  </main>

  <script src="status.js"></script>
</body>
</html>
