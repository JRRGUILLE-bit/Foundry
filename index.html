<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>El Foundry de la Banda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="pixel-overlay.css">
  <link rel="stylesheet" href="effects.css">
</head>
<body>
  <video
    id="site-background"
    aria-hidden="true"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    disablepictureinpicture
  >
    <source src="sitio-guille-clean-loop-web-v2.mp4" type="video/mp4">
  </video>

  <canvas class="fog-layer fog-back" aria-hidden="true"></canvas>
  <canvas class="fog-layer fog-mid" aria-hidden="true"></canvas>
  <canvas class="fog-layer fog-low" aria-hidden="true"></canvas>
  <canvas id="lightning-canvas" class="lightning-layer" aria-hidden="true"></canvas>
  <div id="lightning-flash" class="lightning-flash" aria-hidden="true"></div>

  <div class="background-shade" aria-hidden="true"></div>
  <div class="background-texture" aria-hidden="true"></div>
  <div class="viewport-frame" aria-hidden="true"></div>

  <main class="hero">
    <header class="title-block">
      <h1>
        <span>El Foundry</span>
        <span>de la Banda</span>
      </h1>
      <p>Portal de campañas</p>
    </header>

    <section class="server-panel" id="server-panel" data-state="checking" aria-live="polite">
      <div class="status-row">
        <span class="status-light" aria-hidden="true"></span>
        <span id="status-text">Verificando servidor...</span>
      </div>

      <a
        class="foundry-link"
        id="foundry-link"
        aria-disabled="true"
        tabindex="-1"
        target="_blank"
        rel="noopener noreferrer"
      >
        Clic aquí para entrar al Foundry
      </a>
    </section>
  </main>

  <script src="background.js"></script>
  <script src="effects.js"></script>
  <script src="status.js"></script>
</body>
</html>
