<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>El Foundry de la Banda</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    #site-background {
      opacity: 1;
      filter: none;
      transform: none;
      image-rendering: auto;
    }
  </style>
</head>
<body>
  <video
    id="site-background"
    aria-hidden="true"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    disablepictureinpicture
  >
    <source src="112e7d4c-eb6e-4cc4-8c8a-f1991f07d040.mp4" type="video/mp4">
  </video>

  <main class="hero">
    <header class="title-block">
      <p class="dos-kicker">C:\BANDA\FOUNDRY&gt; BOOT PORTAL.EXE</p>
      <h1>
        <span>EL FOUNDRY</span>
        <span>DE LA BANDA</span>
      </h1>
      <p class="dos-subtitle">PORTAL DE CAMPAÑAS</p>
    </header>

    <section class="server-panel" id="server-panel" data-state="checking" aria-live="polite">
      <div class="status-row">
        <span class="status-light" aria-hidden="true"></span>
        <span id="status-text">RUN CHECK_SERVER.BAT...</span>
      </div>

      <a
        class="foundry-link"
        id="foundry-link"
        aria-disabled="true"
        tabindex="-1"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="prompt-prefix">&gt;</span> Entrar a Foundry
      </a>
    </section>
  </main>

  <script src="status.js"></script>
</body>
</html>
