name: A3.1 Generate Sathar Spell Audit

on:
  push:
    branches:
      - agent/a3-1-sathar-spells
    paths:
      - .github/workflows/a3-1-generate-sathar-spells.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Generate Sathar spell audit
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const code = fs.readFileSync(bundlePath, 'utf8');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(code, context, { filename: bundlePath });

          const root = context.window.BANDA_CHARACTER_DATA || {};
          const character = (context.window.BANDA_CHARACTERS || root.characters || {}).sathar;
          if (!character) throw new Error('Sathar not found');

          const rawItems = new Map((character.rawActor?.items || []).map((item) => [item._id, item]));
          const text = (value) => typeof value === 'string' ? value.trim() : '';
          const activityAudit = (activity) => ({
            id: activity.id || null,
            name: activity.name || null,
            type: activity.type || null,
            activation: activity.activation || null,
            range: activity.range || null,
            target: activity.target || null,
            duration: activity.duration || null,
            attack: activity.attack || null,
            save: activity.save || null,
            damage: activity.damage || null,
            healing: activity.healing || null,
            roll: activity.roll || null,
            hasChatFlavor: Boolean(text(activity.chatFlavor))
          });

          const spells = (character.spells || []).map((spell) => {
            const raw = rawItems.get(spell.id) || null;
            const rawSystem = raw?.system || {};
            const rawProperties = Array.isArray(rawSystem.properties)
              ? rawSystem.properties
              : rawSystem.properties instanceof Set
                ? [...rawSystem.properties]
                : [];
            const description = text(spell.description) || text(rawSystem.description?.value);
            const materials = text(spell.materials) || text(rawSystem.materials?.value);
            const activities = (spell.activities || []).map(activityAudit);
            const components = (spell.components || []).length
              ? spell.components
              : rawProperties.filter((value) => ['v', 's', 'm'].includes(value));
            const missing = [];
            if (!spell.name) missing.push('name');
            if (spell.level === undefined || spell.level === null) missing.push('level');
            if (!spell.school && !spell.schoolLabel && !rawSystem.school) missing.push('school');
            if (!spell.activation?.label && !rawSystem.activation?.type) missing.push('activation');
            if (!spell.range?.label && !rawSystem.range?.units) missing.push('range');
            if (!spell.duration?.label && !rawSystem.duration?.units) missing.push('duration');
            if (components.length === 0) missing.push('components');
            if (!description) missing.push('description');
            if (activities.length === 0 && !rawSystem.activities) missing.push('activities');

            return {
              id: spell.id || null,
              name: spell.name || null,
              level: spell.level ?? rawSystem.level ?? null,
              school: spell.school || rawSystem.school || null,
              schoolLabel: spell.schoolLabel || null,
              prepared: Boolean(spell.prepared),
              method: spell.method || null,
              concentration: Boolean(spell.concentration || rawProperties.includes('concentration')),
              ritual: Boolean(spell.ritual || rawProperties.includes('ritual')),
              activation: spell.activation || rawSystem.activation || null,
              range: spell.range || rawSystem.range || null,
              duration: spell.duration || rawSystem.duration || null,
              target: spell.target || rawSystem.target || null,
              components,
              materials: materials || null,
              description: description || null,
              descriptionLength: description.length,
              activities,
              source: spell.source || rawSystem.source || null,
              raw: raw ? {
                itemId: raw._id,
                itemType: raw.type,
                name: raw.name,
                level: rawSystem.level ?? null,
                school: rawSystem.school || null,
                preparation: rawSystem.preparation || null,
                properties: rawProperties,
                activation: rawSystem.activation || null,
                range: rawSystem.range || null,
                target: rawSystem.target || null,
                duration: rawSystem.duration || null,
                materials: rawSystem.materials || null,
                source: rawSystem.source || null
              } : null,
              missingFields: missing,
              status: missing.length === 0 ? 'COMPLETE_FROM_JSON' : 'NEEDS_REVIEW'
            };
          });

          const byLevel = {};
          for (const spell of spells) byLevel[spell.level] = (byLevel[spell.level] || 0) + 1;
          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            bundleVersion: root.version || null,
            character: {
              id: character.id,
              name: character.name,
              classes: character.classes?.map(({ name, levels, identifier }) => ({ name, levels, identifier })) || [],
              subclasses: character.subclasses || [],
              spellcasting: character.spellcasting || null
            },
            spellCount: spells.length,
            countsByLevel: byLevel,
            statusCounts: spells.reduce((counts, spell) => {
              counts[spell.status] = (counts[spell.status] || 0) + 1;
              return counts;
            }, {}),
            validation: {
              expectedSpellCount: 17,
              countMatchesExpected: spells.length === 17,
              uniqueIds: new Set(spells.map((spell) => spell.id).filter(Boolean)).size === spells.filter((spell) => spell.id).length,
              allHaveNames: spells.every((spell) => Boolean(spell.name)),
              allHaveRawItem: spells.every((spell) => Boolean(spell.raw)),
              allRawItemsAreSpells: spells.every((spell) => spell.raw?.itemType === 'spell')
            },
            spells,
            nextTask: 'A3_2_BALDER_SPELL_AUDIT'
          };

          fs.mkdirSync(path.join('audit', 'spells'), { recursive: true });
          fs.writeFileSync(path.join('audit', 'spells', 'sathar.json'), JSON.stringify(output, null, 2) + '\n');
          NODE

      - name: Commit generated audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/spells/sathar.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A3.1: generate Sathar spell audit"
            git push
          fi
