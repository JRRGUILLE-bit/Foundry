name: A10 Validate Mobile Combat

on:
  pull_request:
    branches: [main]
    paths:
      - mobile-character-shell.js
      - .github/workflows/a10-validate-mobile-combat.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax
        run: node --check mobile-character-shell.js
      - name: Check A10 contract markers
        run: |
          grep -q 'SESSION_TTL_MS' mobile-character-shell.js
          grep -q 'renderHpPanel' mobile-character-shell.js
          grep -q 'renderResources' mobile-character-shell.js
          grep -q 'renderSpellSlots' mobile-character-shell.js
          grep -q 'renderActions' mobile-character-shell.js
          grep -q 'renderSavingThrows' mobile-character-shell.js
          grep -q 'localStorage' mobile-character-shell.js
