name: Patch Browser QA Known Gap

on:
  pull_request:
    paths:
      - ".github/workflows/patch-browser-qa-known-gap.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/a17-2-spell-localization
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove resolved known gap
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path("audit/browser-mobile-qa-runner.mjs")
          source = path.read_text()
          updated, count = re.subn(
              r'  knownGaps: \[.*?\],\n  profiles:',
              '  knownGaps: [],\n  profiles:',
              source,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f"Expected one known-gap block, changed {count}")
          path.write_text(updated)
          PY

      - name: Commit runner metadata update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/browser-mobile-qa-runner.mjs
          git commit -m "Remove resolved spell localization gap from browser QA"
          git push origin HEAD:agent/a17-2-spell-localization