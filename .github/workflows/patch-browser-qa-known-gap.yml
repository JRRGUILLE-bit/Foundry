name: Patch Browser QA Known Gap

on:
  pull_request:
    paths:
      - ".github/workflows/patch-browser-qa-known-gap.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/a17-2-spell-localization
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove resolved known gap
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("audit/browser-mobile-qa-runner.mjs")
          source = path.read_text()
          old = '''  knownGaps: [
            {
              issue: 64,
              title: "Localización de hechizos por personaje",
              blocking: false,
              requirement: "Magna y Melkor en español; resto y fallback global en inglés."
            }
          ],'''
          new = '''  knownGaps: [],'''
          if old not in source:
              raise SystemExit("Expected known-gap block not found")
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Commit runner metadata update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/browser-mobile-qa-runner.mjs
          git commit -m "Remove resolved spell localization gap from browser QA"
          git push origin HEAD:agent/a17-2-spell-localization