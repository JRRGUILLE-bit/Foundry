name: A5.1 Classify Sathar Action Sources

on:
  push:
    branches:
      - agent/a5-1-sathar-features
    paths:
      - .github/workflows/a5-1-classify-sathar-actions.yml

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Classify feature and external actions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'audit/features/sathar.json';
          const audit = JSON.parse(fs.readFileSync(file, 'utf8'));
          const featureTypes = new Set(['feat', 'class', 'subclass', 'race', 'background', 'Rasgo']);
          for (const action of audit.actions || []) {
            if (action.linkedFeatureId) {
              action.linkStatus = 'LINKED_TO_FEATURE';
            } else if (!featureTypes.has(action.sourceType)) {
              action.linkStatus = 'EXTERNAL_ACTION_SOURCE';
            } else {
              action.linkStatus = 'UNRESOLVED_FEATURE_SOURCE';
            }
          }
          const countBy = (items, key) => items.reduce((acc, item) => {
            const value = item[key] ?? 'null';
            acc[value] = (acc[value] || 0) + 1;
            return acc;
          }, {});
          audit.countsByNormalizedActionSourceType = countBy(audit.actions || [], 'sourceType');
          audit.featureActionReferenceCount = (audit.actions || []).filter((action) => action.linkStatus === 'LINKED_TO_FEATURE').length;
          audit.externalActionReferenceCount = (audit.actions || []).filter((action) => action.linkStatus === 'EXTERNAL_ACTION_SOURCE').length;
          audit.unresolvedActionReferenceCount = (audit.actions || []).filter((action) => action.linkStatus === 'UNRESOLVED_FEATURE_SOURCE').length;
          delete audit.validation.allNormalizedActionsLinked;
          audit.validation.allFeatureActionsLinked = audit.unresolvedActionReferenceCount === 0;
          audit.validation.allNormalizedActionsAccountedFor = audit.featureActionReferenceCount + audit.externalActionReferenceCount === audit.character.normalizedActionCount;
          fs.writeFileSync(file, JSON.stringify(audit, null, 2) + '\n');
          NODE
      - name: Commit classified audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/features/sathar.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A5.1: classify Sathar action sources"
            git push
          fi
