name: Mobile QA

on:
  pull_request:
    paths:
      - "index.html"
      - "mobile-*.js"
      - "character-*.js"
      - "characters.js"
      - "foundry_characters_static/**"
      - "audit/mobile-qa.js"
      - ".github/workflows/mobile-qa.yml"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "mobile-*.js"
      - "character-*.js"
      - "characters.js"
      - "foundry_characters_static/**"
      - "audit/mobile-qa.js"
      - ".github/workflows/mobile-qa.yml"

permissions:
  contents: read

jobs:
  mobile-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run mobile QA
        run: node audit/mobile-qa.js
