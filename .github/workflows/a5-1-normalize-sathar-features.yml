name: A5.1 Normalize Sathar Features Audit

on:
  push:
    branches:
      - agent/a5-1-sathar-features
    paths:
      - .github/workflows/a5-1-normalize-sathar-features.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize Sathar action references and resources
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const auditPath = path.join('audit', 'features', 'sathar.json');
          const audit = JSON.parse(fs.readFileSync(auditPath, 'utf8'));
          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync(bundlePath, 'utf8'), context, { filename: bundlePath });
          const root = context.window.BANDA_CHARACTER_DATA || {};
          const character = (context.window.BANDA_CHARACTERS || root.characters || {}).sathar;
          const actions = Array.isArray(character?.actions) ? character.actions : [];
          const clone = (value) => value === undefined ? null : JSON.parse(JSON.stringify(value));
          const key = (value) => typeof value === 'string' ? value.trim().toLocaleLowerCase('en') : '';

          const featureById = new Map((audit.features || []).map((feature) => [feature.id, feature]));
          const featureByName = new Map((audit.features || []).map((feature) => [key(feature.name), feature]));
          const idCandidates = (action) => [
            action.id, action._id, action.itemId, action.sourceId, action.sourceItemId,
            action.parentId, action.featureId, action.item?.id, action.item?._id,
            action.source?.id, action.source?._id, action.rawItemId
          ].filter(Boolean);

          const actionAudits = actions.map((action, index) => {
            let linkedFeature = null;
            for (const id of idCandidates(action)) {
              if (featureById.has(id)) {
                linkedFeature = featureById.get(id);
                break;
              }
            }
            if (!linkedFeature && featureByName.has(key(action.name))) linkedFeature = featureByName.get(key(action.name));
            return {
              order: index + 1,
              id: action.id || action._id || null,
              name: action.name || null,
              type: action.type || null,
              activation: clone(action.activation),
              actionType: action.actionType || action.activation?.type || null,
              uses: clone(action.uses),
              consumption: clone(action.consumption),
              range: clone(action.range),
              target: clone(action.target),
              damage: clone(action.damage),
              save: clone(action.save),
              attack: clone(action.attack),
              linkedFeatureId: linkedFeature?.id || null,
              linkedFeatureName: linkedFeature?.name || null,
              linkStatus: linkedFeature ? 'LINKED_TO_FEATURE' : 'UNRESOLVED_ACTION_SOURCE',
              raw: clone(action)
            };
          });

          const dedupedResources = [];
          const seen = new Set();
          for (const resource of audit.resources || []) {
            const signature = resource.source === 'featureUses'
              ? `feature:${resource.resourceId}`
              : `actor:${key(resource.name)}`;
            if (seen.has(signature)) continue;
            seen.add(signature);
            dedupedResources.push(resource);
          }

          audit.resources = dedupedResources;
          audit.resourceCount = dedupedResources.length;
          audit.actions = actionAudits;
          audit.featureActionReferenceCount = actionAudits.filter((action) => action.linkedFeatureId).length;
          audit.unresolvedActionReferenceCount = actionAudits.filter((action) => !action.linkedFeatureId).length;
          audit.validation.normalizedActionCountMatches = actionAudits.length === audit.character.normalizedActionCount;
          audit.validation.resourceIdsUnique = new Set(dedupedResources.map((resource) => `${resource.source}:${resource.resourceId}`)).size === dedupedResources.length;

          fs.writeFileSync(auditPath, JSON.stringify(audit, null, 2) + '\n');
          NODE
      - name: Commit normalized audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/features/sathar.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A5.1: normalize Sathar features and resources audit"
            git push
          fi
