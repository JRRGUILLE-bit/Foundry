name: A8 Generate Mobile View Model Adapter

on:
  push:
    branches:
      - agent/a8-mobile-view-model-adapter
    paths:
      - .github/workflows/a8-generate-mobile-view-model.yml

permissions:
  contents: write

jobs:
  generate:
    if: github.event.head_commit.message == 'A8: add temporary adapter generator'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write adapter and validate all characters
        shell: bash
        run: |
          python3 - <<'PYCODE'
          from pathlib import Path
          import base64, gzip
          payload = ""
          Path('mobile-character-view-model.js').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PYCODE
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const path = require('path');
          const context = { window: {}, console, setTimeout, clearTimeout };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync('foundry_characters_static/characters.bundle.js', 'utf8'), context, { filename: 'characters.bundle.js' });
          vm.runInContext(fs.readFileSync('mobile-character-view-model.js', 'utf8'), context, { filename: 'mobile-character-view-model.js' });
          const api = context.window.BANDA_MOBILE_VIEW_MODEL;
          if (!api) throw new Error('Adapter API not attached');
          const ids = ['sathar', 'artionketh', 'magna', 'melkor', 'balder', 'ingwe'];
          const read = (file) => JSON.parse(fs.readFileSync(file, 'utf8'));
          const characters = [];
          const totals = { characters: 0, actions: 0, spells: 0, inventory: 0, features: 0, resources: 0, warnings: 0 };
          for (const id of ids) {
            const audits = {
              spells: read(path.join('audit', 'spells', `${id}.json`)),
              inventory: read(path.join('audit', 'items', `${id}.json`)),
              features: read(path.join('audit', 'features', `${id}.json`))
            };
            const session = api.createSessionState(id, { sessionId: `a8-test-${id}`, audits });
            const canonical = context.window.BANDA_CHARACTERS[id];
            const expectedHp = Math.max(0, Number(canonical.hp.max) - 1);
            session.hp.current = expectedHp;
            session.hp.temporary = 7;
            const firstResourceId = Object.keys(session.resources)[0] || null;
            if (firstResourceId) session.resources[firstResourceId].current = 0;
            const firstSlotKey = Object.keys(session.spellSlots)[0] || null;
            if (firstSlotKey) session.spellSlots[firstSlotKey].current = 0;
            const model = api.build(id, { audits, sessionState: session, throwOnInvalid: false });
            const overlayTests = {
              hpCurrentApplied: model.combat.hp.sessionCurrent === expectedHp,
              temporaryHpApplied: model.combat.hp.sessionTemporary === 7,
              firstResourceApplied: !firstResourceId || model.combat.resources.some((resource) => resource.id === firstResourceId && resource.sessionCurrent === 0),
              firstSlotApplied: !firstSlotKey || [...model.combat.spellcasting.slots, model.combat.spellcasting.pact].filter(Boolean).some((slot) => slot.key === firstSlotKey && slot.sessionCurrent === 0)
            };
            const overlayValid = Object.values(overlayTests).every(Boolean);
            characters.push({
              id,
              name: model.identity.name,
              valid: model.validation.valid && overlayValid,
              errors: model.validation.errors,
              warningCount: model.validation.warnings.length,
              counts: model.validation.counts,
              overlayTests,
              sourceStatus: model.source.auditStatus
            });
            totals.characters += 1;
            totals.actions += model.actions.length;
            totals.spells += model.spells.length;
            totals.inventory += model.inventory.length;
            totals.features += model.features.length;
            totals.resources += model.combat.resources.length;
            totals.warnings += model.validation.warnings.length;
          }
          const expected = { characters: 6, actions: 89, spells: 126, inventory: 80, features: 155 };
          const countValidation = Object.fromEntries(Object.entries(expected).map(([key, value]) => [key, totals[key] === value]));
          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            adapter: { path: 'mobile-character-view-model.js', apiVersion: api.version, global: 'window.BANDA_MOBILE_VIEW_MODEL', productionLoaded: false },
            totals,
            expected,
            validation: {
              allCharactersValid: characters.every((character) => character.valid),
              allExpectedCountsMatch: Object.values(countValidation).every(Boolean),
              countValidation,
              zeroModelErrors: characters.every((character) => character.errors.length === 0),
              sessionOverlayWorksForEveryCharacter: characters.every((character) => Object.values(character.overlayTests).every(Boolean))
            },
            status: characters.every((character) => character.valid) && Object.values(countValidation).every(Boolean)
              ? 'ADAPTER_READY_FOR_MOBILE_RENDERER'
              : 'ADAPTER_NEEDS_REVIEW',
            characters,
            nextTask: 'A9_MOBILE_SHEET_SHELL'
          };
          fs.mkdirSync('audit', { recursive: true });
          fs.writeFileSync('audit/mobile-view-model-adapter-summary.json', JSON.stringify(output, null, 2) + '\n');
          console.log(JSON.stringify(output, null, 2));
          NODE
      - name: Commit adapter and validation summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-character-view-model.js audit/mobile-view-model-adapter-summary.json
          git commit -m "A8: add mobile character view model adapter"
          git push
