name: A5.1 Generate Sathar Features Audit

on:
  push:
    branches:
      - agent/a5-1-sathar-features
    paths:
      - .github/workflows/a5-1-generate-sathar-features.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Sathar features and resources audit
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync(bundlePath, 'utf8'), context, { filename: bundlePath });

          const root = context.window.BANDA_CHARACTER_DATA || {};
          const character = (context.window.BANDA_CHARACTERS || root.characters || {}).sathar;
          if (!character) throw new Error('Sathar not found');

          const rawActor = character.rawActor || {};
          const rawItems = Array.isArray(rawActor.items) ? rawActor.items : [];
          const features = Array.isArray(character.features) ? character.features : [];
          const normalizedActions = Array.isArray(character.actions) ? character.actions : [];
          const text = (value) => typeof value === 'string' ? value.trim() : '';
          const clone = (value) => value === undefined ? null : JSON.parse(JSON.stringify(value));
          const values = (value) => Array.isArray(value) ? value : value && typeof value === 'object' ? Object.values(value) : [];
          const keyFor = (value) => text(value).toLocaleLowerCase('en');

          const rawById = new Map(rawItems.map((item) => [item._id || item.id, item]));
          const rawByName = new Map();
          for (const item of rawItems) {
            const key = keyFor(item.name);
            if (!rawByName.has(key)) rawByName.set(key, []);
            rawByName.get(key).push(item);
          }

          const featureTypes = new Set(['feat', 'class', 'subclass', 'race', 'background']);
          const findRawItem = (feature) => {
            for (const id of [feature.rawItem?._id, feature.raw?._id, feature._id, feature.id, feature.sourceId, feature.itemId].filter(Boolean)) {
              if (rawById.has(id)) return rawById.get(id);
            }
            const matches = (rawByName.get(keyFor(feature.name)) || []).filter((raw) => featureTypes.has(raw.type));
            return matches.length === 1 ? matches[0] : null;
          };

          const normalizeActivation = (feature, system, activity) => clone(
            feature.activation || activity?.activation || system.activation || null
          );

          const normalizeUses = (feature, system, activity) => {
            const source = feature.uses || activity?.uses || system.uses || null;
            if (!source) return null;
            const maxRaw = source.max ?? source.value ?? null;
            const spent = Number.isFinite(Number(source.spent)) ? Number(source.spent) : null;
            const max = maxRaw === '' || maxRaw === null || maxRaw === undefined ? null : Number.isFinite(Number(maxRaw)) ? Number(maxRaw) : maxRaw;
            const current = source.current ?? (typeof max === 'number' && spent !== null ? Math.max(0, max - spent) : null);
            return {
              current: clone(current),
              max: clone(max),
              spent: clone(source.spent),
              recovery: clone(source.recovery),
              per: clone(source.per),
              raw: clone(source)
            };
          };

          const activityAudit = (activity) => ({
            id: activity?._id || activity?.id || null,
            name: activity?.name || null,
            type: activity?.type || null,
            activation: clone(activity?.activation),
            consumption: clone(activity?.consumption),
            range: clone(activity?.range),
            target: clone(activity?.target),
            duration: clone(activity?.duration),
            attack: clone(activity?.attack),
            save: clone(activity?.save),
            damage: clone(activity?.damage),
            healing: clone(activity?.healing),
            uses: clone(activity?.uses),
            roll: clone(activity?.roll),
            effectCount: values(activity?.effects).length,
            description: text(activity?.description) || null
          });

          const actionCategory = (activation) => {
            const type = activation?.type || activation?.value || '';
            const normalized = String(type).toLowerCase();
            if (['action'].includes(normalized)) return 'ACTION';
            if (['bonus', 'bonusaction', 'bonus-action'].includes(normalized)) return 'BONUS_ACTION';
            if (['reaction'].includes(normalized)) return 'REACTION';
            if (['special', 'none', ''].includes(normalized)) return 'PASSIVE_OR_SPECIAL';
            return String(type || 'PASSIVE_OR_SPECIAL').toUpperCase();
          };

          const featureAudits = features.map((feature, index) => {
            const raw = findRawItem(feature);
            const system = raw?.system || {};
            const normalizedActivities = values(feature.activities);
            const rawActivities = values(system.activities);
            const activities = (normalizedActivities.length ? normalizedActivities : rawActivities).map(activityAudit);
            const primaryActivity = activities[0] || null;
            const description = text(feature.description) || text(system.description?.value) || text(system.description) || null;
            const activation = normalizeActivation(feature, system, primaryActivity);
            const uses = normalizeUses(feature, system, primaryActivity);
            const missingFields = [];
            if (!(feature.name || raw?.name)) missingFields.push('name');
            if (!raw) missingFields.push('rawItem');
            if (!description) missingFields.push('description');

            return {
              order: index + 1,
              id: feature.id || feature._id || raw?._id || null,
              name: feature.name || raw?.name || null,
              type: feature.type || raw?.type || null,
              sourceType: raw?.type || null,
              actionCategory: actionCategory(activation),
              activation,
              uses,
              recovery: clone(feature.recovery || system.uses?.recovery || system.recovery),
              consumption: clone(feature.consumption || primaryActivity?.consumption),
              range: clone(feature.range || primaryActivity?.range || system.range),
              target: clone(feature.target || primaryActivity?.target || system.target),
              duration: clone(feature.duration || primaryActivity?.duration || system.duration),
              attack: clone(feature.attack || primaryActivity?.attack),
              save: clone(feature.save || primaryActivity?.save),
              damage: clone(feature.damage || primaryActivity?.damage || system.damage),
              healing: clone(feature.healing || primaryActivity?.healing),
              activities,
              activityCount: activities.length,
              effectCount: values(raw?.effects).length,
              description,
              descriptionLength: description?.length || 0,
              source: clone(feature.source || system.source),
              requirements: clone(feature.requirements || system.requirements),
              advancement: clone(system.advancement),
              rawItemId: raw?._id || null,
              rawItemType: raw?.type || null,
              rawSystem: {
                activation: clone(system.activation),
                uses: clone(system.uses),
                recharge: clone(system.recharge),
                type: clone(system.type),
                properties: clone(system.properties),
                source: clone(system.source),
                prerequisites: clone(system.prerequisites),
                requirements: clone(system.requirements)
              },
              missingFields,
              status: missingFields.length ? 'NEEDS_REVIEW' : 'COMPLETE_FROM_JSON'
            };
          });

          const featureIds = new Set(featureAudits.map((feature) => feature.id).filter(Boolean));
          const featureNames = new Set(featureAudits.map((feature) => keyFor(feature.name)).filter(Boolean));
          const featureActions = normalizedActions
            .filter((action) => featureIds.has(action.id || action._id || action.itemId || action.sourceId) || featureNames.has(keyFor(action.name)))
            .map((action, index) => ({
              order: index + 1,
              id: action.id || action._id || null,
              name: action.name || null,
              type: action.type || null,
              activation: clone(action.activation),
              uses: clone(action.uses),
              consumption: clone(action.consumption),
              sourceId: action.sourceId || action.itemId || null,
              raw: clone(action)
            }));

          const actorResourceEntries = [];
          const addResourceEntries = (sourceName, source) => {
            if (!source) return;
            if (Array.isArray(source)) {
              source.forEach((resource, index) => actorResourceEntries.push({ source: sourceName, key: String(index), raw: clone(resource) }));
              return;
            }
            if (typeof source === 'object') {
              Object.entries(source).forEach(([key, resource]) => actorResourceEntries.push({ source: sourceName, key, raw: clone(resource) }));
            }
          };
          addResourceEntries('normalizedCharacter', character.resources);
          addResourceEntries('rawActorSystem', rawActor.system?.resources);

          const featureResources = featureAudits
            .filter((feature) => feature.uses && (feature.uses.max !== null || feature.uses.current !== null || values(feature.uses.recovery).length))
            .map((feature) => ({
              resourceId: feature.id,
              name: feature.name,
              source: 'featureUses',
              current: clone(feature.uses.current),
              max: clone(feature.uses.max),
              spent: clone(feature.uses.spent),
              recovery: clone(feature.uses.recovery),
              actionCategory: feature.actionCategory
            }));

          const deduplicatedActorResources = [];
          const seenResourceSignatures = new Set();
          for (const entry of actorResourceEntries) {
            const raw = entry.raw || {};
            const signature = JSON.stringify({
              label: raw.label || raw.name || entry.key,
              value: raw.value ?? raw.current ?? null,
              max: raw.max ?? null,
              sr: raw.sr ?? null,
              lr: raw.lr ?? null
            });
            if (seenResourceSignatures.has(signature)) continue;
            seenResourceSignatures.add(signature);
            deduplicatedActorResources.push({
              resourceId: raw.id || entry.key,
              name: raw.label || raw.name || entry.key,
              source: entry.source,
              current: clone(raw.current ?? raw.value),
              max: clone(raw.max),
              spent: clone(raw.spent),
              recovery: clone(raw.recovery),
              shortRest: clone(raw.sr),
              longRest: clone(raw.lr),
              raw: clone(raw)
            });
          }

          const allResources = [...featureResources, ...deduplicatedActorResources];
          const countBy = (items, key) => items.reduce((acc, item) => {
            const value = item[key] ?? 'null';
            acc[value] = (acc[value] || 0) + 1;
            return acc;
          }, {});

          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            bundleVersion: root.version || null,
            character: {
              id: character.id,
              name: character.name,
              featureCount: features.length,
              normalizedActionCount: normalizedActions.length
            },
            featureCount: featureAudits.length,
            countsBySourceType: countBy(featureAudits, 'sourceType'),
            countsByActionCategory: countBy(featureAudits, 'actionCategory'),
            statusCounts: countBy(featureAudits, 'status'),
            featuresWithUses: featureAudits.filter((feature) => feature.uses && (feature.uses.max !== null || feature.uses.current !== null)).length,
            featuresWithActivities: featureAudits.filter((feature) => feature.activityCount > 0).length,
            featureActionReferenceCount: featureActions.length,
            resourceCount: allResources.length,
            validation: {
              expectedFeatureCount: 21,
              countMatchesExpected: featureAudits.length === 21,
              uniqueFeatureIds: new Set(featureAudits.map((feature) => feature.id).filter(Boolean)).size === featureAudits.filter((feature) => feature.id).length,
              allFeaturesHaveNames: featureAudits.every((feature) => Boolean(feature.name)),
              allFeaturesHaveRawItem: featureAudits.every((feature) => Boolean(feature.rawItemId)),
              allRawItemsAreFeatureTypes: featureAudits.every((feature) => featureTypes.has(feature.rawItemType))
            },
            reviewFeatures: featureAudits.filter((feature) => feature.status !== 'COMPLETE_FROM_JSON').map(({id,name,missingFields}) => ({id,name,missingFields})),
            resources: allResources,
            featureActions,
            features: featureAudits,
            nextTask: 'A5_2_BALDER_FEATURES_RESOURCES_AUDIT'
          };

          fs.mkdirSync(path.join('audit', 'features'), { recursive: true });
          fs.writeFileSync(path.join('audit', 'features', 'sathar.json'), JSON.stringify(output, null, 2) + '\n');
          NODE
      - name: Commit generated audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/features/sathar.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A5.1: generate Sathar features and resources audit"
            git push
          fi
