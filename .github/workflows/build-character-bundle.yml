name: Build static character bundle

on:
  push:
    branches:
      - main
      - "agent/**"
    paths:
      - "data/characters/**"
      - "scripts/character-normalizer.mjs"
      - "scripts/build-character-bundle.mjs"
      - "package.json"
      - ".github/workflows/build-character-bundle.yml"
  pull_request:
    paths:
      - "data/characters/**"
      - "scripts/character-normalizer.mjs"
      - "scripts/build-character-bundle.mjs"
      - "package.json"
      - "generated/characters.bundle.js"
      - "generated/characters.manifest.json"
      - ".github/workflows/build-character-bundle.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build complete static character bundle
        run: npm run build:characters

      - name: Verify generated files in pull requests
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- generated/characters.bundle.js generated/characters.manifest.json

      - name: Commit generated files
        if: github.event_name == 'push'
        shell: bash
        run: |
          git add generated/characters.bundle.js generated/characters.manifest.json
          if git diff --cached --quiet; then
            echo "Character bundle already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Build static character bundle"
          git push origin "HEAD:${GITHUB_REF_NAME}"
