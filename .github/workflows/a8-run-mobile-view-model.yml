name: A8 Run Mobile View Model Adapter

on:
  push:
    branches:
      - agent/a8-mobile-view-model-adapter
    paths:
      - .github/workflows/a8-run-mobile-view-model.yml

permissions:
  contents: write

jobs:
  generate:
    if: github.event.head_commit.message == 'A8: add temporary adapter runner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract adapter and validation script
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64, gzip, re
          source = Path('.github/workflows/a8-generate-mobile-view-model.yml').read_text()
          payload = re.search(r'payload = "([A-Za-z0-9+/=]+)"', source).group(1)
          Path('mobile-character-view-model.js').write_bytes(gzip.decompress(base64.b64decode(payload)))
          marker = "          node <<'NODE'\n"
          start = source.index(marker) + len(marker)
          end = source.index("          NODE\n", start)
          lines = source[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/a8-validate.js').write_text(script)
          PY
          node --check mobile-character-view-model.js
          node /tmp/a8-validate.js
      - name: Commit adapter and validation summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-character-view-model.js audit/mobile-view-model-adapter-summary.json
          git commit -m "A8: add mobile character view model adapter"
          git push
