name: A8 Run Mobile View Model Adapter

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'agent/a8-mobile-view-model-adapter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/a8-mobile-view-model-adapter
      - name: Extract corrected repair and validation scripts
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/a8-fix-action-identities.yml').read_text()

          python_marker = "          python3 <<'PY'\n"
          python_start = source.index(python_marker) + len(python_marker)
          python_end = source.index("          PY\n", python_start)
          python_lines = source[python_start:python_end].splitlines()
          Path('/tmp/a8-repair.py').write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in python_lines) + '\n')

          node_marker = "          node <<'NODE'\n"
          node_start = source.index(node_marker) + len(node_marker)
          node_end = source.index("          NODE\n", node_start)
          node_lines = source[node_start:node_end].splitlines()
          Path('/tmp/a8-validate.js').write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in node_lines) + '\n')
          PY
          python3 /tmp/a8-repair.py
          node --check mobile-character-view-model.js
          node /tmp/a8-validate.js
      - name: Commit corrected adapter and validation summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-character-view-model.js audit/mobile-view-model-adapter-summary.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A8: repair stable action identities and source links"
            git push
          fi
