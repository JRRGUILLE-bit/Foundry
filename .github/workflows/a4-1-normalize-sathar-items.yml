name: A4.1 Normalize Sathar Inventory Audit

on:
  push:
    branches:
      - agent/a4-1-sathar-items
    paths:
      - .github/workflows/a4-1-normalize-sathar-items.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Normalize categories and review summary
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'audit/items/sathar.json';
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));
          for (const item of data.items || []) {
            if (item.type === 'container') item.category = 'CONTAINER';
          }
          data.countsByCategory = (data.items || []).reduce((acc, item) => {
            const key = item.category || 'OTHER';
            acc[key] = (acc[key] || 0) + 1;
            return acc;
          }, {});
          data.reviewItems = (data.items || [])
            .filter((item) => item.status !== 'COMPLETE_FROM_JSON')
            .map((item) => ({
              id: item.id,
              name: item.name,
              missingFields: item.missingFields
            }));
          fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
          NODE

      - name: Commit normalized audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/items/sathar.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A4.1: normalize Sathar inventory audit"
            git push
          fi
