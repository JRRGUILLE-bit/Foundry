name: A4.5 Normalize Magna Inventory Audit

on:
  push:
    branches:
      - agent/a4-5-magna-items
    paths:
      - .github/workflows/a4-5-normalize-magna-items.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize equipment categories
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'audit/items/magna.json';
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));
          const armorTypes = new Set(['light', 'medium', 'heavy', 'shield', 'natural']);
          for (const item of data.items || []) {
            if (item.type !== 'equipment') continue;
            const equipmentType = item.armor?.type || item.rawSystem?.type?.value || '';
            item.category = armorTypes.has(equipmentType) ? 'ARMOR_OR_SHIELD' : 'EQUIPMENT';
          }
          data.countsByCategory = (data.items || []).reduce((acc, item) => {
            const key = item.category || 'OTHER';
            acc[key] = (acc[key] || 0) + 1;
            return acc;
          }, {});
          fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
          NODE
      - name: Commit normalized audit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/items/magna.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A4.5: normalize Magna inventory categories"
            git push
          fi
