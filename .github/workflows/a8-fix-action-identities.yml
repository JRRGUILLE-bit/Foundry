name: A8 Fix Action Identities

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/a8-mobile-view-model-adapter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/a8-mobile-view-model-adapter
      - name: Repair action identity and source resolution
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('mobile-character-view-model.js')
          source = path.read_text()
          start = source.index('  function mapActions(character, rawIndex, auditIndex, sessionState) {')
          end = source.index('  function mapAbilities(character) {', start)
          replacement = r'''  function mapActions(character, rawIndex, auditIndex, sessionState) {
    const usedAuditOrders = new Set();
    const usedRawItemIds = new Set();
    const actionIdCounts = new Map();
    const auditRecords = [...auditIndex.actionOrder.entries()];

    function recordNameKey(record) {
      return normalizeKey(record?.source || record?.name || record?.linkedFeatureName || record?.linkedInventoryName);
    }

    function selectAuditRecord(action, index) {
      const sourceKey = normalizeKey(action?.source || action?.name || action?.activities?.[0]?.name);
      const ordered = auditIndex.actionOrder.get(index + 1) || null;
      if (ordered && (!sourceKey || recordNameKey(ordered) === sourceKey)) {
        usedAuditOrders.add(index + 1);
        return ordered;
      }
      const matched = auditRecords.find(([order, record]) => !usedAuditOrders.has(order) && sourceKey && recordNameKey(record) === sourceKey);
      if (matched) {
        usedAuditOrders.add(matched[0]);
        return matched[1];
      }
      if (ordered) {
        usedAuditOrders.add(index + 1);
        return ordered;
      }
      return null;
    }

    function selectRawItem(action, auditRecord) {
      for (const id of candidateIds(action, auditRecord)) {
        const raw = rawIndex.byId.get(id);
        if (allowedRawItem(raw, "action")) return raw;
      }

      for (const name of candidateNames(action, auditRecord)) {
        const matches = array(rawIndex.byName.get(normalizeKey(name))).filter((item) => allowedRawItem(item, "action"));
        if (!matches.length) continue;
        const unused = matches.find((item) => {
          const id = item?._id || item?.id;
          return id && !usedRawItemIds.has(id);
        });
        return unused || matches[0];
      }
      return null;
    }

    return array(character.actions).map((action, index) => {
      const auditRecord = selectAuditRecord(action, index);
      const rawItem = selectRawItem(action, auditRecord);
      const rawItemId = rawItem?._id || rawItem?.id || null;
      if (rawItemId) usedRawItemIds.add(rawItemId);

      const sourceEntityId = action.id || action._id || auditRecord?.linkedFeatureId || auditRecord?.linkedInventoryId || rawItemId || auditRecord?.rawItemId || null;
      const actionName = action.name || action.source || action.activities?.[0]?.name || auditRecord?.name || `Acción ${index + 1}`;
      const baseId = action.id || action._id || (sourceEntityId
        ? `${sourceEntityId}:action:${slug(actionName)}`
        : `action:${index + 1}:${slug(actionName)}`);
      const occurrence = (actionIdCounts.get(baseId) || 0) + 1;
      actionIdCounts.set(baseId, occurrence);
      const id = occurrence === 1 ? baseId : `${baseId}:${occurrence}`;

      const sessionEntry = sourceEntityId
        ? sessionState?.resources?.[sourceEntityId] || sessionState?.inventoryUses?.[sourceEntityId]
        : null;
      const activities = array(action.activities).map((activity, activityIndex) => mapActivity(activity, id, activityIndex));
      const activation = clone(action.activation) || clone(activities[0]?.activation) || null;
      const source = sourceMeta(rawItem, auditRecord);
      if (!source.rawItemId && sourceEntityId) source.rawItemId = sourceEntityId;
      if (!source.rawItemType && auditRecord?.linkedFeatureId) source.rawItemType = "feat";
      source.linked = Boolean(source.rawItemId);
      source.linkStatus = auditRecord?.linkStatus || (source.linked ? "LINKED_RAW_SOURCE" : "UNRESOLVED_ACTION_SOURCE");

      return {
        id,
        sessionKey: action.uses ? makeSessionKey(character.id, "action", id) : null,
        sourceEntityId,
        name: actionName,
        sourceName: action.source || action.name || null,
        sourceType: action.sourceType || action.type || rawItem?.type || null,
        actionCategory: actionCategory(activation),
        activation,
        uses: normalizeUses(action.uses, sessionEntry),
        activities,
        description: action.description || "",
        searchText: normalizeKey([action.source, action.name, action.sourceType, action.description].join(" ")),
        source
      };
    });
  }

'''
          path.write_text(source[:start] + replacement + source[end:])
          PY
          node --check mobile-character-view-model.js
      - name: Validate all six characters
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const path = require('path');
          const context = { window: {}, console, setTimeout, clearTimeout };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync('foundry_characters_static/characters.bundle.js', 'utf8'), context, { filename: 'characters.bundle.js' });
          vm.runInContext(fs.readFileSync('mobile-character-view-model.js', 'utf8'), context, { filename: 'mobile-character-view-model.js' });
          const api = context.window.BANDA_MOBILE_VIEW_MODEL;
          if (!api) throw new Error('Adapter API not attached');
          const ids = ['sathar', 'artionketh', 'magna', 'melkor', 'balder', 'ingwe'];
          const read = (file) => JSON.parse(fs.readFileSync(file, 'utf8'));
          const characters = [];
          const totals = { characters: 0, actions: 0, spells: 0, inventory: 0, features: 0, resources: 0, warnings: 0 };

          for (const id of ids) {
            const audits = {
              spells: read(path.join('audit', 'spells', `${id}.json`)),
              inventory: read(path.join('audit', 'items', `${id}.json`)),
              features: read(path.join('audit', 'features', `${id}.json`))
            };
            const session = api.createSessionState(id, { sessionId: `a8-test-${id}`, audits });
            const canonical = context.window.BANDA_CHARACTERS[id];
            const expectedHp = Math.max(0, Number(canonical.hp.max) - 1);
            session.hp.current = expectedHp;
            session.hp.temporary = 7;
            const firstResourceId = Object.keys(session.resources)[0] || null;
            if (firstResourceId) session.resources[firstResourceId].current = 0;
            const firstSlotKey = Object.keys(session.spellSlots)[0] || null;
            if (firstSlotKey) session.spellSlots[firstSlotKey].current = 0;
            const model = api.build(id, { audits, sessionState: session, throwOnInvalid: false });
            const overlayTests = {
              hpCurrentApplied: model.combat.hp.sessionCurrent === expectedHp,
              temporaryHpApplied: model.combat.hp.sessionTemporary === 7,
              firstResourceApplied: !firstResourceId || model.combat.resources.some((resource) => resource.id === firstResourceId && resource.sessionCurrent === 0),
              firstSlotApplied: !firstSlotKey || [...model.combat.spellcasting.slots, model.combat.spellcasting.pact].filter(Boolean).some((slot) => slot.key === firstSlotKey && slot.sessionCurrent === 0)
            };
            const overlayValid = Object.values(overlayTests).every(Boolean);
            characters.push({
              id,
              name: model.identity.name,
              valid: model.validation.valid && overlayValid,
              errors: model.validation.errors,
              warningCount: model.validation.warnings.length,
              counts: model.validation.counts,
              overlayTests,
              sourceStatus: model.source.auditStatus
            });
            totals.characters += 1;
            totals.actions += model.actions.length;
            totals.spells += model.spells.length;
            totals.inventory += model.inventory.length;
            totals.features += model.features.length;
            totals.resources += model.combat.resources.length;
            totals.warnings += model.validation.warnings.length;
          }

          const expected = { characters: 6, actions: 89, spells: 126, inventory: 80, features: 155 };
          const countValidation = Object.fromEntries(Object.entries(expected).map(([key, value]) => [key, totals[key] === value]));
          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            adapter: { path: 'mobile-character-view-model.js', apiVersion: api.version, global: 'window.BANDA_MOBILE_VIEW_MODEL', productionLoaded: false },
            totals,
            expected,
            validation: {
              allCharactersValid: characters.every((character) => character.valid),
              allExpectedCountsMatch: Object.values(countValidation).every(Boolean),
              countValidation,
              zeroModelErrors: characters.every((character) => character.errors.length === 0),
              sessionOverlayWorksForEveryCharacter: characters.every((character) => Object.values(character.overlayTests).every(Boolean))
            },
            status: characters.every((character) => character.valid) && Object.values(countValidation).every(Boolean)
              ? 'ADAPTER_READY_FOR_MOBILE_RENDERER'
              : 'ADAPTER_NEEDS_REVIEW',
            characters,
            nextTask: 'A9_MOBILE_SHEET_SHELL'
          };
          fs.mkdirSync('audit', { recursive: true });
          fs.writeFileSync('audit/mobile-view-model-adapter-summary.json', JSON.stringify(output, null, 2) + '\n');
          console.log(JSON.stringify(output, null, 2));
          NODE
      - name: Commit repaired adapter and validation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-character-view-model.js audit/mobile-view-model-adapter-summary.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A8: repair stable action identities and source links"
            git push
          fi
