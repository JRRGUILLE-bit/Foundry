name: A2 Generate Character Summary

on:
  push:
    branches:
      - agent/a2-character-summary
    paths:
      - .github/workflows/a2-generate-character-summary.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Generate audit summary from active bundle
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const code = fs.readFileSync(bundlePath, 'utf8');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(code, context, { filename: bundlePath });

          const root = context.window.BANDA_CHARACTER_DATA || {};
          const characters = context.window.BANDA_CHARACTERS || root.characters || {};
          const index = context.window.BANDA_CHARACTER_INDEX || root.index || { characters: [] };
          const orderedIds = (index.characters || []).map((entry) => entry.id);
          const ids = orderedIds.length ? orderedIds : Object.keys(characters);

          const normalized = ids.map((id) => {
            const character = characters[id];
            if (!character) throw new Error(`Missing normalized character: ${id}`);

            const rawActor = character.rawActor || null;
            const classes = (character.classes || []).map((entry) => ({
              name: entry.name,
              levels: entry.levels,
              identifier: entry.identifier || null
            }));

            const slots = (character.spellcasting?.slots || []).map((slot) => ({
              level: slot.level,
              current: slot.current,
              max: slot.max
            }));

            const pact = character.spellcasting?.pact
              ? {
                  level: character.spellcasting.pact.level,
                  current: character.spellcasting.pact.current,
                  max: character.spellcasting.pact.max
                }
              : null;

            return {
              id: character.id,
              name: character.name,
              race: character.race,
              level: character.level,
              classes,
              subclasses: character.subclasses || [],
              hp: {
                current: character.hp?.value ?? null,
                max: character.hp?.max ?? null,
                temporary: character.hp?.temp ?? 0
              },
              armorClass: {
                value: character.ac?.value ?? null,
                formula: character.ac?.formula || null
              },
              initiative: character.initiative ?? null,
              proficiencyBonus: character.proficiency ?? null,
              spellcasting: {
                ability: character.spellcasting?.ability || null,
                abilityLabel: character.spellcasting?.abilityLabel || null,
                attackBonus: character.spellcasting?.attack ?? null,
                saveDc: character.spellcasting?.dc ?? null,
                slots,
                pact
              },
              counts: {
                rawItems: Array.isArray(rawActor?.items) ? rawActor.items.length : null,
                spells: Array.isArray(character.spells) ? character.spells.length : 0,
                inventory: Array.isArray(character.inventory) ? character.inventory.length : 0,
                features: Array.isArray(character.features) ? character.features.length : 0,
                actions: Array.isArray(character.actions) ? character.actions.length : 0,
                resources: Array.isArray(character.resources) ? character.resources.length : 0
              },
              source: {
                systemId: character.source?.systemId || rawActor?.system?._source?.system || null,
                systemVersion: character.source?.systemVersion || null,
                coreVersion: character.source?.coreVersion || null,
                hasRawActor: Boolean(rawActor)
              }
            };
          });

          const sum = (key) => normalized.reduce((total, character) => total + (character.counts[key] || 0), 0);
          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            branchSource: 'main',
            bundle: {
              path: bundlePath,
              schemaVersion: root.schemaVersion ?? null,
              dataVersion: root.version || null,
              generated: root.generated || null,
              declaredSource: root.source || null
            },
            characterCount: normalized.length,
            totals: {
              rawItems: sum('rawItems'),
              spells: sum('spells'),
              inventory: sum('inventory'),
              features: sum('features'),
              actions: sum('actions'),
              resources: sum('resources')
            },
            characters: normalized,
            validation: {
              allCharactersPresent: normalized.length === 6,
              allLevelFifteen: normalized.every((character) => character.level === 15),
              allRawActorsPresent: normalized.every((character) => character.source.hasRawActor),
              allClassLevelsMatchCharacterLevel: normalized.every((character) =>
                character.classes.reduce((total, entry) => total + Number(entry.levels || 0), 0) === character.level
              )
            },
            nextTask: 'A3_1_SATHAR_SPELL_AUDIT'
          };

          fs.mkdirSync('audit', { recursive: true });
          fs.writeFileSync('audit/characters-summary.json', JSON.stringify(output, null, 2) + '\n');
          NODE

      - name: Commit generated audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/characters-summary.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A2: generate character summary audit"
            git push
          fi
