name: A3.5 Generate Magna Spell Audit

on:
  push:
    branches:
      - agent/a3-5-magna-spells
    paths:
      - .github/workflows/a3-5-generate-magna-spells.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Generate Magna spell audit
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const code = fs.readFileSync(bundlePath, 'utf8');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(code, context, { filename: bundlePath });

          const root = context.window.BANDA_CHARACTER_DATA || {};
          const character = (context.window.BANDA_CHARACTERS || root.characters || {}).magna;
          if (!character) throw new Error('Magna not found');

          const rawItems = Array.isArray(character.rawActor?.items) ? character.rawActor.items : [];
          const rawById = new Map(rawItems.map((item) => [item._id, item]));
          const cleanText = (value) => typeof value === 'string' ? value.trim() : '';
          const componentsFromRaw = (raw) => {
            const values = raw?.system?.properties;
            if (!Array.isArray(values)) return [];
            const map = { vocal: 'V', somatic: 'S', material: 'M' };
            return values.map((value) => map[value] || value).filter(Boolean);
          };
          const activityAudit = (activity) => ({
            id: activity.id || activity._id || null,
            name: activity.name || null,
            type: activity.type || null,
            activation: activity.activation || null,
            range: activity.range || null,
            target: activity.target || null,
            duration: activity.duration || null,
            attack: activity.attack || null,
            save: activity.save || null,
            damage: activity.damage || null,
            healing: activity.healing || null,
            roll: activity.roll || null,
            consumption: activity.consumption || null,
            hasChatFlavor: Boolean(cleanText(activity.chatFlavor))
          });

          const spells = (character.spells || []).map((spell) => {
            const raw = rawById.get(spell.id) || rawItems.find((item) => item.type === 'spell' && item.name === spell.name) || null;
            const description = cleanText(spell.description) || cleanText(raw?.system?.description?.value);
            const materials = cleanText(spell.materials) || cleanText(raw?.system?.materials?.value);
            const components = Array.isArray(spell.components) && spell.components.length
              ? spell.components
              : componentsFromRaw(raw);
            const activities = (spell.activities || []).map(activityAudit);
            const missing = [];
            if (!spell.name) missing.push('name');
            if (spell.level === undefined || spell.level === null) missing.push('level');
            if (!spell.school && !spell.schoolLabel) missing.push('school');
            if (!spell.activation?.label) missing.push('activation');
            if (!spell.range?.label) missing.push('range');
            if (!spell.duration?.label) missing.push('duration');
            if (!components.length) missing.push('components');
            if (!description) missing.push('description');
            if (!activities.length) missing.push('activities');

            return {
              id: spell.id || raw?._id || null,
              name: spell.name || raw?.name || null,
              level: spell.level ?? raw?.system?.level ?? null,
              school: spell.school || raw?.system?.school || null,
              schoolLabel: spell.schoolLabel || null,
              prepared: Boolean(spell.prepared),
              method: spell.method || null,
              concentration: Boolean(spell.concentration),
              ritual: Boolean(spell.ritual),
              activation: spell.activation || null,
              range: spell.range || null,
              duration: spell.duration || null,
              target: spell.target || null,
              components,
              materials: materials || null,
              description: description || null,
              descriptionLength: description.length,
              activities,
              source: spell.source || raw?.system?.source || null,
              rawItemId: raw?._id || null,
              rawItemType: raw?.type || null,
              rawSystem: raw?.system || null,
              missingFields: missing,
              status: missing.length === 0 ? 'COMPLETE_FROM_JSON' : 'NEEDS_REVIEW'
            };
          });

          const countsByLevel = {};
          const statusCounts = {};
          for (const spell of spells) {
            countsByLevel[spell.level] = (countsByLevel[spell.level] || 0) + 1;
            statusCounts[spell.status] = (statusCounts[spell.status] || 0) + 1;
          }

          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            bundleVersion: root.version || null,
            character: {
              id: character.id,
              name: character.name,
              classes: character.classes?.map(({ name, levels, identifier }) => ({ name, levels, identifier })) || [],
              subclasses: character.subclasses || [],
              spellcasting: character.spellcasting || null
            },
            spellCount: spells.length,
            countsByLevel,
            statusCounts,
            validation: {
              expectedSpellCount: 20,
              countMatchesExpected: spells.length === 20,
              uniqueIds: new Set(spells.map((spell) => spell.id).filter(Boolean)).size === spells.filter((spell) => spell.id).length,
              allHaveNames: spells.every((spell) => Boolean(spell.name)),
              allHaveRawItem: spells.every((spell) => Boolean(spell.rawItemId)),
              allRawItemsAreSpells: spells.every((spell) => spell.rawItemType === 'spell')
            },
            spells,
            nextTask: 'A3_6_ARTIONKETH_SPELL_AUDIT'
          };

          fs.mkdirSync(path.join('audit', 'spells'), { recursive: true });
          fs.writeFileSync(path.join('audit', 'spells', 'magna.json'), JSON.stringify(output, null, 2) + '\n');
          NODE

      - name: Commit generated audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/spells/magna.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A3.5: generate Magna spell audit"
            git push
          fi
