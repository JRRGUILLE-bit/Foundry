name: A3.2 Generate Balder Spell Audit

on:
  push:
    branches:
      - agent/a3-2-balder-spells
    paths:
      - .github/workflows/a3-2-generate-balder-spells.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Generate Balder spell audit
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const code = fs.readFileSync(bundlePath, 'utf8');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(code, context, { filename: bundlePath });

          const root = context.window.BANDA_CHARACTER_DATA || {};
          const character = (context.window.BANDA_CHARACTERS || root.characters || {}).balder;
          if (!character) throw new Error('Balder not found');

          const text = (value) => typeof value === 'string' ? value.trim() : '';
          const rawItems = Array.isArray(character.rawActor?.items) ? character.rawActor.items : [];
          const rawById = new Map(rawItems.map((item) => [item._id, item]));
          const toArray = (value) => Array.isArray(value) ? value : value ? [...value] : [];

          const activityAudit = (activity) => ({
            id: activity.id || null,
            name: activity.name || null,
            type: activity.type || null,
            activation: activity.activation || null,
            range: activity.range || null,
            target: activity.target || null,
            duration: activity.duration || null,
            attack: activity.attack || null,
            save: activity.save || null,
            damage: activity.damage || null,
            healing: activity.healing || null,
            roll: activity.roll || null,
            hasChatFlavor: Boolean(text(activity.chatFlavor))
          });

          const spells = (character.spells || []).map((spell) => {
            const rawItem = rawById.get(spell.id) || null;
            const rawSystem = rawItem?.system || {};
            const description = text(spell.description) || text(rawSystem.description?.value);
            const materials = text(spell.materials) || text(rawSystem.materials?.value);
            const normalizedComponents = Array.isArray(spell.components) ? spell.components : [];
            const rawProperties = toArray(rawSystem.properties);
            const rawComponents = rawProperties.filter((entry) => ['v', 's', 'm'].includes(String(entry).toLowerCase()));
            const components = normalizedComponents.length ? normalizedComponents : rawComponents.map((entry) => String(entry).toUpperCase());
            const activities = (spell.activities || []).map(activityAudit);
            const missing = [];

            if (!spell.name) missing.push('name');
            if (spell.level === undefined || spell.level === null) missing.push('level');
            if (!spell.school && !spell.schoolLabel) missing.push('school');
            if (!spell.activation?.label) missing.push('activation');
            if (!spell.range?.label) missing.push('range');
            if (!spell.duration?.label) missing.push('duration');
            if (components.length === 0) missing.push('components');
            if (!description) missing.push('description');
            if (activities.length === 0) missing.push('activities');
            if (!rawItem) missing.push('rawItem');

            const rawAudit = rawItem ? {
              id: rawItem._id || null,
              name: rawItem.name || null,
              type: rawItem.type || null,
              level: rawSystem.level ?? null,
              school: rawSystem.school || null,
              preparation: rawSystem.preparation || null,
              activation: rawSystem.activation || null,
              range: rawSystem.range || null,
              target: rawSystem.target || null,
              duration: rawSystem.duration || null,
              properties: rawProperties,
              materials: rawSystem.materials || null,
              uses: rawSystem.uses || null,
              source: rawSystem.source || null,
              activities: rawSystem.activities || null
            } : null;

            return {
              id: spell.id || null,
              name: spell.name || null,
              level: spell.level ?? null,
              school: spell.school || null,
              schoolLabel: spell.schoolLabel || null,
              prepared: Boolean(spell.prepared),
              method: spell.method || null,
              concentration: Boolean(spell.concentration),
              ritual: Boolean(spell.ritual),
              activation: spell.activation || null,
              range: spell.range || null,
              duration: spell.duration || null,
              target: spell.target || null,
              components,
              componentSource: normalizedComponents.length ? 'normalized' : rawComponents.length ? 'rawActor.system.properties' : null,
              materials: materials || null,
              description: description || null,
              descriptionLength: description.length,
              activities,
              source: spell.source || rawSystem.source || null,
              rawItem: rawAudit,
              missingFields: missing,
              status: missing.length === 0 ? 'COMPLETE_FROM_JSON' : 'NEEDS_REVIEW'
            };
          });

          const byLevel = {};
          const statusCounts = {};
          for (const spell of spells) {
            byLevel[spell.level] = (byLevel[spell.level] || 0) + 1;
            statusCounts[spell.status] = (statusCounts[spell.status] || 0) + 1;
          }

          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            bundleVersion: root.version || null,
            character: {
              id: character.id,
              name: character.name,
              classes: character.classes?.map(({ name, levels, identifier }) => ({ name, levels, identifier })) || [],
              subclasses: character.subclasses || [],
              spellcasting: character.spellcasting || null
            },
            spellCount: spells.length,
            countsByLevel: byLevel,
            statusCounts,
            validation: {
              expectedSpellCount: 15,
              countMatchesExpected: spells.length === 15,
              uniqueIds: new Set(spells.map((spell) => spell.id).filter(Boolean)).size === spells.filter((spell) => spell.id).length,
              allHaveNames: spells.every((spell) => Boolean(spell.name)),
              allHaveRawItem: spells.every((spell) => Boolean(spell.rawItem)),
              allRawItemsAreSpells: spells.every((spell) => spell.rawItem?.type === 'spell')
            },
            spells,
            nextTask: 'A3_3_MELKOR_SPELL_AUDIT'
          };

          fs.mkdirSync(path.join('audit', 'spells'), { recursive: true });
          fs.writeFileSync(path.join('audit', 'spells', 'balder.json'), JSON.stringify(output, null, 2) + '\n');
          NODE

      - name: Commit generated audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/spells/balder.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A3.2: generate Balder spell audit"
            git push
          fi
