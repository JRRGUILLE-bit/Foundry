name: Browser Mobile QA

on:
  pull_request:
    paths:
      - "index.html"
      - "*.css"
      - "mobile-*.js"
      - "character-*.js"
      - "characters.js"
      - "foundry_characters_static/**"
      - "audit/browser-mobile-qa.mjs"
      - ".github/workflows/browser-mobile-qa.yml"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "*.css"
      - "mobile-*.js"
      - "character-*.js"
      - "characters.js"
      - "foundry_characters_static/**"
      - "audit/browser-mobile-qa.mjs"
      - ".github/workflows/browser-mobile-qa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-mobile-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install --no-save playwright@1.54.1

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Check QA script syntax
        run: node --check audit/browser-mobile-qa.mjs

      - name: Run browser QA
        run: node audit/browser-mobile-qa.mjs

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-mobile-qa-${{ github.sha }}
          path: audit/browser-qa-artifacts/
          if-no-files-found: warn
          retention-days: 14
