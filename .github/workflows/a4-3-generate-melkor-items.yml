name: A4.3 Generate Melkor Inventory Audit

on:
  push:
    branches:
      - agent/a4-3-melkor-items
    paths:
      - .github/workflows/a4-3-generate-melkor-items.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Melkor inventory audit
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync(bundlePath, 'utf8'), context, { filename: bundlePath });

          const root = context.window.BANDA_CHARACTER_DATA || {};
          const character = (context.window.BANDA_CHARACTERS || root.characters || {}).melkor;
          if (!character) throw new Error('Melkor not found');

          const rawActor = character.rawActor || {};
          const rawItems = Array.isArray(rawActor.items) ? rawActor.items : [];
          const inventory = Array.isArray(character.inventory) ? character.inventory : [];
          const text = (value) => typeof value === 'string' ? value.trim() : '';
          const values = (value) => Array.isArray(value) ? value : value && typeof value === 'object' ? Object.values(value) : [];
          const clone = (value) => value === undefined ? null : JSON.parse(JSON.stringify(value));

          const rawById = new Map(rawItems.map((item) => [item._id || item.id, item]));
          const rawByName = new Map();
          for (const item of rawItems) {
            const key = text(item.name).toLocaleLowerCase('en');
            if (!rawByName.has(key)) rawByName.set(key, []);
            rawByName.get(key).push(item);
          }

          const findRawItem = (item) => {
            for (const id of [item.rawItem?._id, item.raw?._id, item._id, item.id, item.sourceId].filter(Boolean)) {
              if (rawById.has(id)) return rawById.get(id);
            }
            const matches = rawByName.get(text(item.name).toLocaleLowerCase('en')) || [];
            const inventoryMatches = matches.filter((raw) => !['spell','feat','class','subclass','race','background'].includes(raw.type));
            return inventoryMatches.length === 1 ? inventoryMatches[0] : null;
          };

          const activityAudit = (activity) => ({
            id: activity?._id || activity?.id || null,
            name: activity?.name || null,
            type: activity?.type || null,
            activation: clone(activity?.activation),
            consumption: clone(activity?.consumption),
            range: clone(activity?.range),
            target: clone(activity?.target),
            duration: clone(activity?.duration),
            attack: clone(activity?.attack),
            save: clone(activity?.save),
            damage: clone(activity?.damage),
            healing: clone(activity?.healing),
            uses: clone(activity?.uses),
            roll: clone(activity?.roll),
            effectCount: values(activity?.effects).length,
            description: text(activity?.description) || null
          });

          const categoryFor = (raw, item) => {
            const type = raw?.type || item?.type || 'unknown';
            if (type === 'weapon') return 'WEAPON';
            if (type === 'equipment') {
              const armorType = raw?.system?.type?.value || raw?.system?.armor?.type || item?.armor?.type;
              return armorType ? 'ARMOR_OR_SHIELD' : 'EQUIPMENT';
            }
            if (type === 'consumable') return 'CONSUMABLE';
            if (type === 'tool') return 'TOOL';
            if (type === 'backpack' || type === 'container') return 'CONTAINER';
            if (type === 'loot') return 'GENERAL_OR_LOOT';
            return 'OTHER';
          };

          const audits = inventory.map((item, index) => {
            const raw = findRawItem(item);
            const system = raw?.system || {};
            const normalizedActivities = values(item.activities);
            const rawActivities = values(system.activities);
            const activities = (normalizedActivities.length ? normalizedActivities : rawActivities).map(activityAudit);
            const description = text(item.description) || text(system.description?.value) || text(system.description) || null;
            const rarity = item.rarity ?? system.rarity ?? null;
            const properties = values(item.properties).length ? clone(item.properties) : clone(system.properties);
            const attunement = item.attunement ?? system.attunement ?? null;
            const missingFields = [];
            if (!(item.name || raw?.name)) missingFields.push('name');
            if (!(item.type || raw?.type)) missingFields.push('type');
            if (!raw) missingFields.push('rawItem');
            if (!description) missingFields.push('description');

            return {
              order: index + 1,
              id: item.id || item._id || raw?._id || null,
              name: item.name || raw?.name || null,
              type: item.type || raw?.type || null,
              category: categoryFor(raw, item),
              quantity: item.quantity ?? system.quantity ?? 1,
              weight: clone(item.weight ?? system.weight?.value ?? system.weight),
              price: clone(item.price ?? system.price),
              rarity,
              magical: Boolean(item.magical || system.magicalBonus || (rarity && rarity !== 'common') || values(properties).includes('mgc')),
              equipped: Boolean(item.equipped ?? system.equipped ?? false),
              attunement: clone(attunement),
              attuned: attunement === 2 || attunement === 'attuned' || system.attuned === true,
              identified: item.identified ?? system.identified ?? null,
              proficient: item.proficient ?? null,
              uses: clone(item.uses ?? system.uses),
              consumableType: item.consumableType ?? system.type?.value ?? null,
              armor: clone(item.armor ?? system.armor),
              weapon: {
                weaponType: item.weaponType ?? system.type?.value ?? null,
                mastery: clone(item.mastery ?? system.mastery),
                damage: clone(item.damage ?? system.damage),
                range: clone(item.range ?? system.range),
                properties
              },
              activities,
              activityCount: activities.length,
              description,
              descriptionLength: description?.length || 0,
              source: clone(item.source ?? system.source),
              container: clone(item.container ?? system.container),
              rawItemId: raw?._id || null,
              rawItemType: raw?.type || null,
              rawSystem: {
                quantity: clone(system.quantity), weight: clone(system.weight), price: clone(system.price), rarity: clone(system.rarity),
                attunement: clone(system.attunement), equipped: clone(system.equipped), identified: clone(system.identified),
                uses: clone(system.uses), recharge: clone(system.recharge), armor: clone(system.armor), damage: clone(system.damage),
                range: clone(system.range), properties: clone(system.properties), type: clone(system.type), source: clone(system.source)
              },
              missingFields,
              status: missingFields.length ? 'NEEDS_REVIEW' : 'COMPLETE_FROM_JSON'
            };
          });

          const countBy = (key) => audits.reduce((acc, item) => {
            const value = item[key] ?? 'null';
            acc[value] = (acc[value] || 0) + 1;
            return acc;
          }, {});

          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            bundleVersion: root.version || null,
            character: { id: character.id, name: character.name, inventoryCount: inventory.length },
            inventoryCount: audits.length,
            countsByType: countBy('type'),
            countsByCategory: countBy('category'),
            statusCounts: countBy('status'),
            equippedCount: audits.filter((item) => item.equipped).length,
            attunedCount: audits.filter((item) => item.attuned).length,
            itemsWithUses: audits.filter((item) => item.uses && (item.uses.max ?? item.uses.value ?? item.uses.spent ?? item.uses.recovery)).length,
            itemsWithActivities: audits.filter((item) => item.activityCount > 0).length,
            validation: {
              expectedInventoryCount: 17,
              countMatchesExpected: audits.length === 17,
              uniqueIds: new Set(audits.map((item) => item.id).filter(Boolean)).size === audits.filter((item) => item.id).length,
              allHaveNames: audits.every((item) => Boolean(item.name)),
              allHaveRawItem: audits.every((item) => Boolean(item.rawItemId)),
              noSpellsOrFeaturesIncluded: audits.every((item) => !['spell','feat','class','subclass','race','background'].includes(item.rawItemType))
            },
            reviewItems: audits.filter((item) => item.status !== 'COMPLETE_FROM_JSON').map(({id,name,missingFields}) => ({id,name,missingFields})),
            items: audits,
            nextTask: 'A4_4_INGWE_INVENTORY_AUDIT'
          };

          fs.mkdirSync(path.join('audit', 'items'), { recursive: true });
          fs.writeFileSync(path.join('audit', 'items', 'melkor.json'), JSON.stringify(output, null, 2) + '\n');
          NODE
      - name: Commit generated audit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/items/melkor.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A4.3: generate Melkor inventory audit"
            git push
          fi
