name: Spell Localization QA

on:
  pull_request:
    paths:
      - "spell-localization-es.js"
      - "index.html"
      - "audit/spells/magna.json"
      - "audit/spells/melkor.json"
      - "audit/spell-localization-qa.js"
      - ".github/workflows/spell-localization-qa.yml"
  push:
    branches:
      - main
    paths:
      - "spell-localization-es.js"
      - "index.html"
      - "audit/spells/magna.json"
      - "audit/spells/melkor.json"
      - "audit/spell-localization-qa.js"
      - ".github/workflows/spell-localization-qa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spell-localization-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check scripts
        run: |
          node --check spell-localization-es.js
          node --check audit/spell-localization-qa.js
      - name: Run localization QA
        run: node audit/spell-localization-qa.js
