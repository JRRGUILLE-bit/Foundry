name: A3.4 Generate Ingwe Spell Audit

on:
  push:
    branches:
      - agent/a3-4-ingwe-spells
    paths:
      - .github/workflows/a3-4-generate-ingwe-spells.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Generate Ingwe spell audit
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const bundlePath = path.join('foundry_characters_static', 'characters.bundle.js');
          const code = fs.readFileSync(bundlePath, 'utf8');
          const context = { window: {}, console };
          vm.createContext(context);
          vm.runInContext(code, context, { filename: bundlePath });

          const root = context.window.BANDA_CHARACTER_DATA || {};
          const character = (context.window.BANDA_CHARACTERS || root.characters || {}).ingwe;
          if (!character) throw new Error('Ingwe not found');

          const rawActor = character.rawActor || {};
          const rawItems = Array.isArray(rawActor.items) ? rawActor.items : [];
          const rawById = new Map(rawItems.map((item) => [item._id, item]));
          const text = (value) => typeof value === 'string' ? value.trim() : '';
          const clone = (value) => value === undefined ? null : JSON.parse(JSON.stringify(value));

          const normalizedComponents = (spell, rawItem) => {
            const direct = Array.isArray(spell.components) ? spell.components.filter(Boolean) : [];
            if (direct.length) return direct;
            const properties = rawItem?.system?.properties;
            if (!properties) return [];
            const values = Array.isArray(properties)
              ? properties
              : properties instanceof Set
                ? [...properties]
                : typeof properties === 'object'
                  ? Object.entries(properties).filter(([, enabled]) => Boolean(enabled)).map(([key]) => key)
                  : [];
            return values.filter((entry) => ['v', 's', 'm', 'verbal', 'somatic', 'material'].includes(String(entry).toLowerCase()));
          };

          const activityAudit = (activity) => ({
            id: activity.id || null,
            name: activity.name || null,
            type: activity.type || null,
            activation: clone(activity.activation),
            range: clone(activity.range),
            target: clone(activity.target),
            duration: clone(activity.duration),
            attack: clone(activity.attack),
            save: clone(activity.save),
            damage: clone(activity.damage),
            healing: clone(activity.healing),
            roll: clone(activity.roll),
            consumption: clone(activity.consumption),
            uses: clone(activity.uses),
            hasChatFlavor: Boolean(text(activity.chatFlavor))
          });

          const spells = (character.spells || []).map((spell) => {
            const rawItem = rawById.get(spell.id) || rawItems.find((item) => item.type === 'spell' && item.name === spell.name) || null;
            const description = text(spell.description) || text(rawItem?.system?.description?.value);
            const materials = text(spell.materials) || text(rawItem?.system?.materials?.value);
            const components = normalizedComponents(spell, rawItem);
            const activities = (spell.activities || []).map(activityAudit);
            const missing = [];
            if (!spell.name) missing.push('name');
            if (spell.level === undefined || spell.level === null) missing.push('level');
            if (!spell.school && !spell.schoolLabel) missing.push('school');
            if (!spell.activation?.label) missing.push('activation');
            if (!spell.range?.label) missing.push('range');
            if (!spell.duration?.label) missing.push('duration');
            if (components.length === 0) missing.push('components');
            if (!description) missing.push('description');
            if (activities.length === 0) missing.push('activities');

            return {
              id: spell.id || null,
              name: spell.name || null,
              level: spell.level ?? null,
              school: spell.school || null,
              schoolLabel: spell.schoolLabel || null,
              prepared: Boolean(spell.prepared),
              method: spell.method || null,
              concentration: Boolean(spell.concentration),
              ritual: Boolean(spell.ritual),
              activation: clone(spell.activation),
              range: clone(spell.range),
              duration: clone(spell.duration),
              target: clone(spell.target),
              components,
              materials: materials || null,
              description: description || null,
              descriptionLength: description.length,
              activities,
              source: clone(spell.source),
              rawItemId: rawItem?._id || null,
              rawItemType: rawItem?.type || null,
              rawItem: rawItem ? {
                id: rawItem._id || null,
                name: rawItem.name || null,
                type: rawItem.type || null,
                img: rawItem.img || null,
                level: rawItem.system?.level ?? null,
                school: rawItem.system?.school || null,
                properties: clone(rawItem.system?.properties),
                preparation: clone(rawItem.system?.preparation),
                activation: clone(rawItem.system?.activation),
                range: clone(rawItem.system?.range),
                target: clone(rawItem.system?.target),
                duration: clone(rawItem.system?.duration),
                materials: clone(rawItem.system?.materials),
                activities: clone(rawItem.system?.activities),
                source: clone(rawItem.system?.source)
              } : null,
              missingFields: missing,
              status: missing.length === 0 ? 'COMPLETE_FROM_JSON' : 'NEEDS_REVIEW'
            };
          });

          const byLevel = {};
          const statusCounts = {};
          for (const spell of spells) {
            byLevel[spell.level] = (byLevel[spell.level] || 0) + 1;
            statusCounts[spell.status] = (statusCounts[spell.status] || 0) + 1;
          }

          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            bundleVersion: root.version || null,
            character: {
              id: character.id,
              name: character.name,
              classes: character.classes?.map(({ name, levels, identifier }) => ({ name, levels, identifier })) || [],
              subclasses: character.subclasses || [],
              spellcasting: character.spellcasting || null
            },
            spellCount: spells.length,
            countsByLevel: byLevel,
            statusCounts,
            validation: {
              expectedSpellCount: 29,
              countMatchesExpected: spells.length === 29,
              uniqueIds: new Set(spells.map((spell) => spell.id).filter(Boolean)).size === spells.filter((spell) => spell.id).length,
              allHaveNames: spells.every((spell) => Boolean(spell.name)),
              allHaveRawItem: spells.every((spell) => Boolean(spell.rawItemId)),
              allRawItemsAreSpells: spells.every((spell) => spell.rawItemType === 'spell')
            },
            spells,
            nextTask: 'A3_5_MAGNA_SPELL_AUDIT'
          };

          fs.mkdirSync(path.join('audit', 'spells'), { recursive: true });
          fs.writeFileSync(path.join('audit', 'spells', 'ingwe.json'), JSON.stringify(output, null, 2) + '\n');
          NODE

      - name: Commit generated audit file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/spells/ingwe.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A3.4: generate Ingwe spell audit"
            git push
          fi
