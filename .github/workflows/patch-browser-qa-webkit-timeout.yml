name: Patch Browser QA WebKit Timeout

on:
  push:
    branches:
      - agent/a17-2-spell-localization
    paths:
      - ".github/workflows/patch-browser-qa-webkit-timeout.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/a17-2-spell-localization

      - name: Extend bounded WebKit recovery wait
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("audit/browser-mobile-qa-runner.mjs")
          source = path.read_text()
          old = '''    await page.waitForFunction(() => matchMedia("(max-width: 820px)").matches && innerWidth <= 820, null, { timeout: 5_000 });
              await sleep(500);
              opened = await page.evaluate((id) => window.BANDA_MOBILE_SHELL.open(id), characterId);'''
          new = '''    await page.waitForFunction(() => matchMedia("(max-width: 820px)").matches && innerWidth <= 820, null, { timeout: 15_000 });
              await sleep(500);
              opened = await page.evaluate((id) => window.BANDA_MOBILE_SHELL.open(id), characterId);'''
          if old not in source:
              raise SystemExit("Expected WebKit recovery block not found")
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Commit runner fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/browser-mobile-qa-runner.mjs
          git commit -m "Allow WebKit viewport recovery before first retry"
          git push origin HEAD:agent/a17-2-spell-localization