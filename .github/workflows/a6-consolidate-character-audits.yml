name: A6 Consolidate Character Audits

on:
  push:
    branches:
      - agent/a6-consolidate-character-audits
    paths:
      - .github/workflows/a6-consolidate-character-audits.yml

permissions:
  contents: write

jobs:
  consolidate:
    if: "${{ github.event.head_commit.message == 'A6: add temporary consolidation generator' }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build consolidated character audit
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const readJson = (file) => JSON.parse(fs.readFileSync(file, 'utf8'));
          const clone = (value) => value == null ? value : JSON.parse(JSON.stringify(value));
          const sum = (items, selector) => items.reduce((total, item) => total + Number(selector(item) || 0), 0);
          const allTrue = (object) => Object.values(object || {}).every((value) => value !== false);
          const failedChecks = (object) => Object.entries(object || {})
            .filter(([, value]) => value === false)
            .map(([name]) => name);

          const sourceSummary = readJson(path.join('audit', 'source-summary.json'));
          const characterSummary = readJson(path.join('audit', 'characters-summary.json'));
          const characterOrder = Array.isArray(sourceSummary.characterOrder)
            ? sourceSummary.characterOrder
            : ['sathar', 'artionketh', 'magna', 'melkor', 'balder', 'ingwe'];
          const summaryById = new Map((characterSummary.characters || []).map((character) => [character.id, character]));
          const manifestCharacters = sourceSummary.manifest?.characters || {};

          const fileMap = {};
          const globalReviewQueue = [];

          const characters = characterOrder.map((id) => {
            const base = summaryById.get(id);
            if (!base) throw new Error(`Missing character summary for ${id}`);

            const files = {
              spells: `audit/spells/${id}.json`,
              inventory: `audit/items/${id}.json`,
              features: `audit/features/${id}.json`
            };
            fileMap[id] = files;

            const spellAudit = readJson(files.spells);
            const itemAudit = readJson(files.inventory);
            const featureAudit = readJson(files.features);
            const manifest = manifestCharacters[id] || {};

            const spellReviews = (spellAudit.spells || [])
              .filter((spell) => spell.status !== 'COMPLETE_FROM_JSON')
              .map((spell) => ({
                domain: 'spell',
                characterId: id,
                characterName: base.name,
                id: spell.id || null,
                name: spell.name || null,
                level: spell.level ?? null,
                missingFields: clone(spell.missingFields || []),
                status: spell.status || 'NEEDS_REVIEW'
              }));

            const itemReviews = (itemAudit.items || [])
              .filter((item) => item.status !== 'COMPLETE_FROM_JSON')
              .map((item) => ({
                domain: 'inventory',
                characterId: id,
                characterName: base.name,
                id: item.id || null,
                name: item.name || null,
                itemType: item.type || null,
                category: item.category || null,
                missingFields: clone(item.missingFields || []),
                status: item.status || 'NEEDS_REVIEW'
              }));

            const featureReviews = (featureAudit.features || [])
              .filter((feature) => feature.status !== 'COMPLETE_FROM_JSON')
              .map((feature) => ({
                domain: 'feature',
                characterId: id,
                characterName: base.name,
                id: feature.id || null,
                name: feature.name || null,
                sourceType: feature.sourceType || feature.type || null,
                missingFields: clone(feature.missingFields || []),
                status: feature.status || 'NEEDS_REVIEW'
              }));

            globalReviewQueue.push(...spellReviews, ...itemReviews, ...featureReviews);

            const validationFailures = {
              spells: failedChecks(spellAudit.validation),
              inventory: failedChecks(itemAudit.validation),
              features: failedChecks(featureAudit.validation)
            };
            const unresolvedActions = clone(featureAudit.unresolvedActions || []);
            const blockingIssueCount = validationFailures.spells.length
              + validationFailures.inventory.length
              + validationFailures.features.length
              + unresolvedActions.length;
            const reviewCount = spellReviews.length + itemReviews.length + featureReviews.length;

            const normalizedActionCount = featureAudit.character?.normalizedActionCount
              ?? manifest.actions
              ?? base.counts?.actions
              ?? 0;
            const linkedFeatureActions = featureAudit.featureActionReferenceCount
              ?? (featureAudit.featureActions || []).length;
            const externalActions = featureAudit.externalActionReferenceCount
              ?? (featureAudit.externalActions || []).length;

            const countChecks = {
              spellsMatchManifest: spellAudit.spellCount === manifest.spells,
              inventoryMatchesManifest: itemAudit.inventoryCount === manifest.inventory,
              featuresMatchManifest: featureAudit.featureCount === manifest.features,
              actionsMatchManifest: normalizedActionCount === manifest.actions,
              rawItemAccountingMatchesManifest:
                Number(spellAudit.spellCount || 0)
                + Number(itemAudit.inventoryCount || 0)
                + Number(featureAudit.featureCount || 0)
                === Number(manifest.rawItems || 0)
            };

            return {
              id,
              name: base.name,
              profile: {
                race: base.race,
                level: base.level,
                classes: clone(base.classes || []),
                subclasses: clone(base.subclasses || []),
                hp: clone(base.hp),
                armorClass: clone(base.armorClass),
                initiative: base.initiative,
                proficiencyBonus: base.proficiencyBonus,
                spellcasting: clone(base.spellcasting),
                source: clone(base.source)
              },
              manifest: clone(manifest),
              audits: {
                spells: {
                  file: files.spells,
                  count: spellAudit.spellCount,
                  countsByLevel: clone(spellAudit.countsByLevel || {}),
                  statusCounts: clone(spellAudit.statusCounts || {}),
                  completeCount: spellAudit.statusCounts?.COMPLETE_FROM_JSON || 0,
                  reviewCount: spellReviews.length,
                  reviewItems: spellReviews,
                  validation: clone(spellAudit.validation || {}),
                  failedChecks: validationFailures.spells
                },
                inventory: {
                  file: files.inventory,
                  count: itemAudit.inventoryCount,
                  countsByType: clone(itemAudit.countsByType || {}),
                  countsByCategory: clone(itemAudit.countsByCategory || {}),
                  statusCounts: clone(itemAudit.statusCounts || {}),
                  completeCount: itemAudit.statusCounts?.COMPLETE_FROM_JSON || 0,
                  reviewCount: itemReviews.length,
                  reviewItems: itemReviews,
                  equippedCount: itemAudit.equippedCount || 0,
                  attunedCount: itemAudit.attunedCount || 0,
                  itemsWithUses: itemAudit.itemsWithUses || 0,
                  itemsWithActivities: itemAudit.itemsWithActivities || 0,
                  validation: clone(itemAudit.validation || {}),
                  failedChecks: validationFailures.inventory
                },
                features: {
                  file: files.features,
                  count: featureAudit.featureCount,
                  countsBySourceType: clone(featureAudit.countsBySourceType || {}),
                  countsByActionCategory: clone(featureAudit.countsByActionCategory || {}),
                  statusCounts: clone(featureAudit.statusCounts || {}),
                  completeCount: featureAudit.statusCounts?.COMPLETE_FROM_JSON || 0,
                  reviewCount: featureReviews.length,
                  reviewItems: featureReviews,
                  featuresWithUses: featureAudit.featuresWithUses || 0,
                  featuresWithActivities: featureAudit.featuresWithActivities || 0,
                  resourceCount: featureAudit.resourceCount || (featureAudit.resources || []).length,
                  resources: clone(featureAudit.resources || []),
                  validation: clone(featureAudit.validation || {}),
                  failedChecks: validationFailures.features
                },
                actions: {
                  normalizedCount: normalizedActionCount,
                  linkedToFeatures: linkedFeatureActions,
                  external: externalActions,
                  unresolvedCount: unresolvedActions.length,
                  unresolvedActions
                }
              },
              countChecks,
              validation: {
                allAuditChecksPassed:
                  allTrue(spellAudit.validation)
                  && allTrue(itemAudit.validation)
                  && allTrue(featureAudit.validation),
                allCountsMatchManifest: Object.values(countChecks).every(Boolean),
                allNormalizedActionsAccountedFor: unresolvedActions.length === 0,
                blockingIssueCount
              },
              reviewCount,
              readiness: blockingIssueCount > 0
                ? 'BLOCKED_BY_AUDIT_FAILURES'
                : reviewCount > 0
                  ? 'AUDITED_WITH_NON_BLOCKING_REVIEW_QUEUE'
                  : 'AUDITED_COMPLETE'
            };
          });

          const totals = {
            characters: characters.length,
            rawItems: sum(characters, (character) => character.manifest.rawItems),
            spells: sum(characters, (character) => character.audits.spells.count),
            inventory: sum(characters, (character) => character.audits.inventory.count),
            features: sum(characters, (character) => character.audits.features.count),
            actions: sum(characters, (character) => character.audits.actions.normalizedCount),
            linkedFeatureActions: sum(characters, (character) => character.audits.actions.linkedToFeatures),
            externalActions: sum(characters, (character) => character.audits.actions.external),
            unresolvedActions: sum(characters, (character) => character.audits.actions.unresolvedCount),
            auditedResources: sum(characters, (character) => character.audits.features.resourceCount),
            normalizedCharacterResources: characterSummary.totals?.resources || 0,
            completeEntities:
              sum(characters, (character) => character.audits.spells.completeCount)
              + sum(characters, (character) => character.audits.inventory.completeCount)
              + sum(characters, (character) => character.audits.features.completeCount),
            reviewEntities: globalReviewQueue.length,
            auditedEntities:
              sum(characters, (character) => character.audits.spells.count)
              + sum(characters, (character) => character.audits.inventory.count)
              + sum(characters, (character) => character.audits.features.count)
          };

          const reviewCountsByDomain = globalReviewQueue.reduce((counts, item) => {
            counts[item.domain] = (counts[item.domain] || 0) + 1;
            return counts;
          }, { spell: 0, inventory: 0, feature: 0 });

          const bundleVersions = new Set();
          bundleVersions.add(sourceSummary.manifest?.version || null);
          for (const id of characterOrder) {
            for (const domain of ['spells', 'items', 'features']) {
              const file = domain === 'items' ? `audit/items/${id}.json` : `audit/${domain}/${id}.json`;
              bundleVersions.add(readJson(file).bundleVersion || null);
            }
          }
          bundleVersions.delete(null);

          const blockingCharacters = characters
            .filter((character) => character.validation.blockingIssueCount > 0)
            .map((character) => character.id);

          const validation = {
            allSixCharactersPresent: characters.length === 6,
            characterOrderMatchesSourceAudit:
              JSON.stringify(characters.map((character) => character.id)) === JSON.stringify(characterOrder),
            oneBundleVersionAcrossAudits: bundleVersions.size === 1,
            bundleVersionMatchesCanonicalManifest:
              bundleVersions.size === 1 && [...bundleVersions][0] === sourceSummary.manifest?.version,
            rawItemTotalMatchesManifest: totals.rawItems === sourceSummary.manifest?.totals?.rawItems,
            spellTotalMatchesManifest: totals.spells === sourceSummary.manifest?.totals?.spells,
            inventoryTotalMatchesManifest: totals.inventory === sourceSummary.manifest?.totals?.inventory,
            featureTotalMatchesManifest: totals.features === sourceSummary.manifest?.totals?.features,
            actionTotalMatchesManifest: totals.actions === sourceSummary.manifest?.totals?.actions,
            auditedEntityAccountingMatchesRawItems: totals.auditedEntities === totals.rawItems,
            allPerCharacterCountsMatchManifest: characters.every((character) => character.validation.allCountsMatchManifest),
            allAuditValidationChecksPassed: characters.every((character) => character.validation.allAuditChecksPassed),
            allNormalizedActionsAccountedFor: totals.unresolvedActions === 0,
            noBlockingCharacters: blockingCharacters.length === 0,
            reviewQueueAccountingMatches:
              reviewCountsByDomain.spell
              + reviewCountsByDomain.inventory
              + reviewCountsByDomain.feature
              === totals.reviewEntities,
            completePlusReviewMatchesAuditedEntities:
              totals.completeEntities + totals.reviewEntities === totals.auditedEntities
          };

          const output = {
            auditVersion: 1,
            generatedAt: new Date().toISOString(),
            repository: 'JRRGUILLE-bit/Foundry',
            sourceBranch: 'main',
            canonicalBundle: {
              path: sourceSummary.canonicalCharacterSource?.path,
              version: sourceSummary.manifest?.version,
              generated: sourceSummary.canonicalCharacterSource?.generated,
              declaredSource: sourceSummary.canonicalCharacterSource?.declaredSource,
              rawActorPreservedForEveryCharacter:
                sourceSummary.canonicalCharacterSource?.containsRawActorForEveryCharacter === true
            },
            sourceAudits: {
              sourceSummary: 'audit/source-summary.json',
              characterSummary: 'audit/characters-summary.json',
              perCharacter: fileMap
            },
            reviewPolicy: {
              blockingDefinition:
                'A blocking issue is a failed count, source-link, ID, type, or action-accounting validation.',
              nonBlockingDefinition:
                'NEEDS_REVIEW records remain linked to their raw Foundry item but lack one or more structured or descriptive fields in the export.',
              reviewQueueMayProceedToDataModel: blockingCharacters.length === 0
            },
            totals,
            reviewCountsByDomain,
            blockingCharacters,
            validation,
            status: blockingCharacters.length > 0
              ? 'BLOCKED_BY_AUDIT_FAILURES'
              : globalReviewQueue.length > 0
                ? 'CONSOLIDATED_READY_WITH_NON_BLOCKING_REVIEW_QUEUE'
                : 'CONSOLIDATED_COMPLETE',
            globalReviewQueue,
            characters,
            nextTask: 'A7_MOBILE_CHARACTER_DATA_CONTRACT'
          };

          fs.writeFileSync(path.join('audit', 'consolidated-summary.json'), JSON.stringify(output, null, 2) + '\n');
          NODE
      - name: Commit consolidated audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/consolidated-summary.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "A6: generate consolidated character audit"
            git push
          fi
